<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الموسيقى - القائمة المحدثة</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            width: 350px;
        }
        .cover-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .track-title {
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: bold;
            height: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 13px;
            color: #b3b3b3;
        }
        #progress-bar {
            flex-grow: 1;
            margin: 0 10px;
            cursor: pointer;
            accent-color: #1db954;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        .controls button {
            background-color: transparent;
            color: white;
            border: 1px solid #1db954;
            padding: 10px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .controls button:hover {
            background-color: #1db954;
            color: black;
        }
        .controls button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }
        #play-btn, #pause-btn {
            background-color: #1db954;
            color: black;
            width: 55px;
            height: 55px;
            font-size: 20px;
        }
        #youtube-player {
            display: none;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <img id="cover-img" src="" class="cover-image" alt="صورة الأغنية">
        <div class="track-title" id="track-name">جاري التحميل...</div>
        
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" min="0" max="100" disabled>
            <span id="duration">0:00</span>
        </div>
        
        <div class="controls">
            <button id="prev-track-btn" disabled title="السابق">⏮</button>
            <button id="backward-btn" disabled title="رجوع 10 ثواني">⏪</button>
            <button id="play-btn" disabled title="تشغيل">▶</button>
            <button id="pause-btn" disabled title="إيقاف" style="display:none;">⏸</button>
            <button id="forward-btn" disabled title="تقديم 10 ثواني">⏩</button>
            <button id="next-track-btn" disabled title="التالي">⏭</button>
        </div>
    </div>

    <div id="youtube-player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var timeUpdater; 
        var isDragging = false; 

        // === قائمة الأغاني بالـ IDs الجديدة اللي طلبتها مع أول أغنيتين ===

            { id: 'F0qQguKVSQY', title: 'الأغنية الأولى' },

            { id: 'OPf0YbXqDm0', title: 'أغنية 61' },
            { id: 'wJnBTPUQS5A', title: 'أغنية 62' }
        ];
        
        var currentTrackIndex = 0; 

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', 
                width: '0', 
                videoId: playlist[currentTrackIndex].id,
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function loadTrack(index) {
            if (index >= playlist.length) index = 0;
            if (index < 0) index = playlist.length - 1;
            
            currentTrackIndex = index;
            var track = playlist[currentTrackIndex];

            document.getElementById('track-name').innerText = track.title;
            // سحب الصورة المصغرة بأعلى جودة
            document.getElementById('cover-img').src = "https://img.youtube.com/vi/" + track.id + "/hqdefault.jpg";
            
            document.getElementById('progress-bar').value = 0;
            document.getElementById('current-time').innerText = "0:00";
            document.getElementById('duration').innerText = "0:00";

            if (player && typeof player.loadVideoById === "function") {
                player.loadVideoById(track.id);
            }
        }

        function onPlayerReady(event) {
            document.querySelectorAll('button').forEach(btn => btn.disabled = false);
            document.getElementById('progress-bar').disabled = false;

            loadTrack(currentTrackIndex);
            player.pauseVideo(); 

            document.getElementById('play-btn').addEventListener('click', function() {
                player.playVideo();
                this.style.display = 'none';
                document.getElementById('pause-btn').style.display = 'block';
            });
            document.getElementById('pause-btn').addEventListener('click', function() {
                player.pauseVideo();
                this.style.display = 'none';
                document.getElementById('play-btn').style.display = 'block';
            });

            document.getElementById('next-track-btn').addEventListener('click', function() {
                loadTrack(currentTrackIndex + 1);
            });
            document.getElementById('prev-track-btn').addEventListener('click', function() {
                loadTrack(currentTrackIndex - 1);
            });

            document.getElementById('forward-btn').addEventListener('click', function() {
                player.seekTo(player.getCurrentTime() + 10, true);
            });
            document.getElementById('backward-btn').addEventListener('click', function() {
                player.seekTo(player.getCurrentTime() - 10, true);
            });

            var progressBar = document.getElementById('progress-bar');
            progressBar.addEventListener('mousedown', () => isDragging = true);
            progressBar.addEventListener('touchstart', () => isDragging = true);
            
            progressBar.addEventListener('change', function() {
                var duration = player.getDuration();
                player.seekTo((this.value / 100) * duration, true);
                isDragging = false;
            });
            progressBar.addEventListener('touchend', () => isDragging = false);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('duration').innerText = formatTime(player.getDuration());
                timeUpdater = setInterval(updateProgressBar, 500);
                
                document.getElementById('play-btn').style.display = 'none';
                document.getElementById('pause-btn').style.display = 'block';
            } else {
                clearInterval(timeUpdater);
                if (event.data == YT.PlayerState.PAUSED) {
                    document.getElementById('pause-btn').style.display = 'none';
                    document.getElementById('play-btn').style.display = 'block';
                }
            }

            if (event.data == YT.PlayerState.ENDED) {
                loadTrack(currentTrackIndex + 1);
            }
        }

        function updateProgressBar() {
            if (!isDragging && player && player.getDuration() > 0) {
                var currentTime = player.getCurrentTime();
                var duration = player.getDuration();
                document.getElementById('progress-bar').value = (currentTime / duration) * 100;
                document.getElementById('current-time').innerText = formatTime(currentTime);
            }
        }

        function formatTime(timeInSeconds) {
            var minutes = Math.floor(timeInSeconds / 60);
            var seconds = Math.floor(timeInSeconds % 60);
            if (seconds < 10) seconds = "0" + seconds;
            return minutes + ":" + seconds;
        }
    </script>
</body>
</html>
