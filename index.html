<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل موسيقى متطور</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            width: 320px;
        }
        /* تصميم صورة الأغنية */
        .cover-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .track-title {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        /* شريط الوقت */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 13px;
            color: #b3b3b3;
        }
        #progress-bar {
            flex-grow: 1;
            margin: 0 10px;
            cursor: pointer;
            accent-color: #1db954; /* لون الشريط */
        }
        /* أزرار التحكم */
        .controls button {
            background-color: transparent;
            color: white;
            border: 1px solid #1db954;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .controls button:hover {
            background-color: #1db954;
        }
        .controls button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }
        #play-btn, #pause-btn {
            background-color: #1db954;
            color: black;
            font-weight: bold;
        }
        /* إخفاء يوتيوب الأصلي */
        #youtube-player {
            display: none;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <img src="https://img.youtube.com/vi/iq05BWnXHoI/hqdefault.jpg" class="cover-image" alt="صورة الأغنية">
        
        <div class="track-title" id="track-name">هاى معاكو حمو - حمو المرشدى</div>
        
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" min="0" max="100" disabled>
            <span id="duration">0:00</span>
        </div>
        
        <div class="controls">
            <button id="backward-btn" disabled>⏪ 10ث</button>
            <button id="play-btn" disabled>▶ تشغيل</button>
            <button id="pause-btn" disabled>⏸</button>
            <button id="forward-btn" disabled>⏩ 10ث</button>
        </div>
    </div>

    <div id="youtube-player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var timeUpdater; // عشان نحدث شريط الوقت كل ثانية
        var isDragging = false; // عشان نعرف لو المستخدم بيسحب الشريط

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', 
                width: '0', 
                videoId: 'iq05BWnXHoI',
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // تفعيل كل الأزرار وشريط التقدم
            document.querySelectorAll('button').forEach(btn => btn.disabled = false);
            document.getElementById('progress-bar').disabled = false;

            // أحداث أزرار التشغيل والإيقاف
            document.getElementById('play-btn').addEventListener('click', function() {
                player.playVideo();
            });
            document.getElementById('pause-btn').addEventListener('click', function() {
                player.pauseVideo();
            });

            // أحداث التقديم والتأخير (10 ثواني)
            document.getElementById('forward-btn').addEventListener('click', function() {
                var currentTime = player.getCurrentTime();
                player.seekTo(currentTime + 10, true);
            });
            document.getElementById('backward-btn').addEventListener('click', function() {
                var currentTime = player.getCurrentTime();
                player.seekTo(currentTime - 10, true);
            });

            // التعامل مع سحب شريط التقدم
            var progressBar = document.getElementById('progress-bar');
            
            // لما نضغط على الشريط عشان نسحب
            progressBar.addEventListener('mousedown', function() { isDragging = true; });
            progressBar.addEventListener('touchstart', function() { isDragging = true; }); // للموبايل
            
            // لما نسيب الشريط
            progressBar.addEventListener('change', function() {
                var duration = player.getDuration();
                var seekToTime = (this.value / 100) * duration;
                player.seekTo(seekToTime, true);
                isDragging = false;
            });
            progressBar.addEventListener('touchend', function() { isDragging = false; }); // للموبايل
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                // أول ما الأغنية تشتغل، نظهر وقتها الإجمالي ونبدأ نحدث العداد
                document.getElementById('duration').innerText = formatTime(player.getDuration());
                timeUpdater = setInterval(updateProgressBar, 500); // تحديث كل نص ثانية
            } else {
                // لو وقفت الأغنية نوقف التحديث
                clearInterval(timeUpdater);
            }
        }

        // دالة تحديث شريط التقدم والوقت الحالي
        function updateProgressBar() {
            if (!isDragging && player && player.getDuration() > 0) {
                var currentTime = player.getCurrentTime();
                var duration = player.getDuration();
                
                // تحديث مكان الشريط
                document.getElementById('progress-bar').value = (currentTime / duration) * 100;
                // تحديث النص بتاع الوقت
                document.getElementById('current-time').innerText = formatTime(currentTime);
            }
        }

        // دالة لتحويل الثواني لشكل دقايق وثواني (مثال: 02:30)
        function formatTime(timeInSeconds) {
            var minutes = Math.floor(timeInSeconds / 60);
            var seconds = Math.floor(timeInSeconds % 60);
            if (seconds < 10) { seconds = "0" + seconds; }
            return minutes + ":" + seconds;
        }
    </script>
</body>
</html>
